[pytest]
# Collect unit tests and the docstring examples in src
testpaths = tests src
# Disable live logs on console by default (opt in with: pytest -o log_cli=true --log-cli-level=DEBUG)
log_cli = false
# Show DEBUG+ messages
log_cli_level = DEBUG
log_cli_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
# Show extra summary info for skipped/failed tests; run doctests in src modules.
# importlib mode avoids module-name clashes between conftest files during doctest collection.
addopts = -ra --doctest-modules --import-mode=importlib
timeout = 60
# Register custom markers
markers =
    stress: marks tests as stress tests (deselect with '-m "not stress"')
    property: marks tests as property-based tests
    kaleido: marks tests that require the kaleido package for static image export
